<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; width: 320px; margin: 0; padding: 14px; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      label { display: block; margin-top: 10px; font-weight: 600; }
      input { width: 100%; padding: 6px 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
      button { margin-top: 12px; padding: 8px 12px; background: #2f3437; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
      .hint { color: #666; font-size: 11px; margin-top: 4px; }
      .status { margin-top: 10px; font-size: 12px; }
      .status.ok { color: #0a7d34; }
      .status.err { color: #b91c1c; }
    </style>
  </head>
  <body>
    <h1>Auction Sourcing Hub</h1>

    <label for="token">Notion Integration Token</label>
    <input id="token" type="password" placeholder="secret_..." />
    <div class="hint">Internal integration token (starts with <code>secret_</code> or <code>ntn_</code>).</div>

    <label for="dbid">Notion Database ID</label>
    <input id="dbid" type="text" placeholder="32-char id or full URL" />
    <div class="hint">Paste the database URL — the ID is extracted automatically.</div>

    <button id="save">Save</button>
    <div id="status" class="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
