<!DOCTYPE html>
<html>
<head>
    <title>Auction Hub</title>
    <style>
        body { width: 300px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        label { display: block; margin-top: 10px; font-weight: bold; font-size: 12px; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 15px; width: 100%; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        #saveBtn { background-color: #f1f1f1; color: #333; }
        #saveBtn:hover { background-color: #e1e1e1; }
        #scrapeBtn { background-color: #000000; color: white; margin-top: 20px; }
        #scrapeBtn:hover { background-color: #333333; }
        .message { display: none; margin-top: 10px; font-size: 12px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Notion Setup</h3>
    
    <label for="notionToken">Internal Integration Token:</label>
    <input type="password" id="notionToken" placeholder="ntn_123456789...">

    <label for="dbId">Database ID:</label>
    <input type="text" id="dbId" placeholder="10a3948bf0824bba9a...">

    <button id="saveBtn">Save Settings</button>
    <div id="statusMessage" class="message" style="color: green;">Settings saved!</div>

    <button id="scrapeBtn">Send Current Lot to Notion</button>
    <div id="actionMessage" class="message"></div>

    <script src="popup.js"></script>
</body>
</html>
